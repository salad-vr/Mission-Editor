<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mission Maker</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

*{margin:0;padding:0;box-sizing:border-box}

:root{
  --bg:#111118;
  --bg2:#1a1a24;
  --bg3:#22222e;
  --bg4:#2a2a38;
  --border:#333345;
  --border2:#444458;
  --text:#e0e0ee;
  --text2:#9999aa;
  --text3:#666678;
  --accent:#4f8fff;
  --accent2:#3a6fdd;
  --accent-bg:rgba(79,143,255,0.1);
  --red:#ff4d6a;
  --green:#34d399;
  --yellow:#fbbf24;
  --orange:#f97316;
  --purple:#a855f7;
  --cyan:#22d3ee;
  --pink:#ec4899;
  --radius:6px;
  --sidebar-w:260px;
  --toolbar-h:48px;
}

html,body{height:100%;overflow:hidden}

body{
  font-family:'Inter',system-ui,sans-serif;
  background:var(--bg);
  color:var(--text);
  font-size:13px;
  display:flex;
  flex-direction:column;
}

/* ===== TOP TOOLBAR ===== */
.toolbar{
  height:var(--toolbar-h);
  background:var(--bg2);
  border-bottom:1px solid var(--border);
  display:flex;
  align-items:center;
  padding:0 12px;
  gap:6px;
  z-index:100;
  flex-shrink:0;
}

.toolbar .brand{
  font-weight:700;
  font-size:14px;
  color:var(--accent);
  margin-right:12px;
  letter-spacing:0.5px;
  white-space:nowrap;
}

.toolbar .sep{
  width:1px;
  height:24px;
  background:var(--border);
  margin:0 4px;
}

.tool-btn{
  height:34px;
  min-width:34px;
  padding:0 10px;
  border:1px solid transparent;
  border-radius:var(--radius);
  background:transparent;
  color:var(--text2);
  font-family:inherit;
  font-size:12px;
  font-weight:500;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:5px;
  transition:all 0.15s;
  white-space:nowrap;
}

.tool-btn:hover{background:var(--bg3);color:var(--text)}
.tool-btn.active{background:var(--accent-bg);color:var(--accent);border-color:rgba(79,143,255,0.3)}
.tool-btn svg{width:16px;height:16px;flex-shrink:0}

.tool-group{display:flex;gap:2px;align-items:center}

.toolbar .spacer{flex:1}

/* Color picker in toolbar */
.color-swatch{
  width:22px;height:22px;border-radius:4px;border:2px solid var(--border);
  cursor:pointer;transition:border-color 0.15s;
}
.color-swatch:hover{border-color:var(--text2)}

.size-select{
  height:30px;padding:0 8px;border-radius:var(--radius);
  background:var(--bg3);border:1px solid var(--border);color:var(--text);
  font-family:inherit;font-size:12px;cursor:pointer;
}

/* ===== MAIN LAYOUT ===== */
.main{
  display:flex;
  flex:1;
  overflow:hidden;
}

/* ===== LEFT SIDEBAR (LAYERS) ===== */
.sidebar{
  width:var(--sidebar-w);
  background:var(--bg2);
  border-right:1px solid var(--border);
  display:flex;
  flex-direction:column;
  flex-shrink:0;
  z-index:50;
}

.sidebar-header{
  padding:12px 14px;
  font-weight:600;
  font-size:12px;
  text-transform:uppercase;
  letter-spacing:1px;
  color:var(--text3);
  border-bottom:1px solid var(--border);
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.sidebar-header .add-btn{
  width:24px;height:24px;border-radius:4px;border:1px solid var(--border);
  background:transparent;color:var(--text2);cursor:pointer;font-size:16px;
  display:flex;align-items:center;justify-content:center;transition:all 0.15s;
}
.sidebar-header .add-btn:hover{background:var(--accent-bg);color:var(--accent);border-color:rgba(79,143,255,0.3)}

.layers-list{
  flex:1;overflow-y:auto;padding:6px;
}

.layer-item{
  display:flex;align-items:center;gap:8px;
  padding:8px 10px;border-radius:var(--radius);
  cursor:pointer;transition:background 0.15s;
  margin-bottom:2px;
  border:1px solid transparent;
}
.layer-item:hover{background:var(--bg3)}
.layer-item.active{background:var(--accent-bg);border-color:rgba(79,143,255,0.2)}

.layer-item .vis-btn{
  width:20px;height:20px;border-radius:3px;border:none;
  background:transparent;cursor:pointer;display:flex;
  align-items:center;justify-content:center;color:var(--text2);
  flex-shrink:0;
}
.layer-item .vis-btn:hover{color:var(--text)}
.layer-item .vis-btn.hidden{color:var(--text3);opacity:0.4}

.layer-item .layer-name{
  flex:1;font-size:12px;font-weight:500;overflow:hidden;
  text-overflow:ellipsis;white-space:nowrap;
}

.layer-item .layer-name input{
  width:100%;background:var(--bg);border:1px solid var(--accent);
  border-radius:3px;padding:2px 5px;color:var(--text);font-family:inherit;
  font-size:12px;outline:none;
}

.layer-item .floor-badge{
  font-size:10px;padding:1px 6px;border-radius:3px;
  background:var(--bg4);color:var(--text3);font-weight:600;
  flex-shrink:0;
}

.layer-item .del-btn{
  width:18px;height:18px;border-radius:3px;border:none;
  background:transparent;cursor:pointer;display:flex;
  align-items:center;justify-content:center;color:var(--text3);
  font-size:12px;opacity:0;transition:all 0.15s;flex-shrink:0;
}
.layer-item:hover .del-btn{opacity:1}
.layer-item .del-btn:hover{color:var(--red);background:rgba(255,77,106,0.1)}

/* Floor tabs */
.floor-tabs{
  border-top:1px solid var(--border);
  padding:8px;
}

.floor-tabs-label{
  font-size:11px;font-weight:600;text-transform:uppercase;
  letter-spacing:1px;color:var(--text3);margin-bottom:6px;padding:0 4px;
  display:flex;justify-content:space-between;align-items:center;
}

.floor-tabs-row{display:flex;gap:4px;flex-wrap:wrap}

.floor-tab{
  padding:5px 12px;border-radius:var(--radius);border:1px solid var(--border);
  background:var(--bg3);color:var(--text2);font-family:inherit;font-size:11px;
  font-weight:600;cursor:pointer;transition:all 0.15s;
}
.floor-tab:hover{border-color:var(--text3);color:var(--text)}
.floor-tab.active{background:var(--accent-bg);border-color:rgba(79,143,255,0.3);color:var(--accent)}

/* ===== CANVAS AREA ===== */
.canvas-wrap{
  flex:1;position:relative;overflow:hidden;
  background:var(--bg);cursor:default;
}

.canvas-wrap canvas{
  position:absolute;top:0;left:0;
}

/* Drop zone overlay */
.drop-overlay{
  position:absolute;inset:0;
  background:rgba(79,143,255,0.08);
  border:3px dashed var(--accent);
  border-radius:12px;
  display:none;
  align-items:center;justify-content:center;
  z-index:200;
  pointer-events:none;
  margin:20px;
}

.drop-overlay.show{display:flex}

.drop-overlay .drop-text{
  background:var(--bg2);border:1px solid var(--border);
  border-radius:var(--radius);padding:20px 36px;text-align:center;
}

.drop-overlay .drop-text h3{font-size:16px;margin-bottom:4px;color:var(--accent)}
.drop-overlay .drop-text p{color:var(--text2);font-size:12px}

/* Zoom indicator */
.zoom-indicator{
  position:absolute;bottom:14px;right:14px;
  background:var(--bg2);border:1px solid var(--border);
  border-radius:var(--radius);padding:6px 14px;
  font-size:11px;font-weight:600;color:var(--text2);
  display:flex;align-items:center;gap:8px;
  z-index:30;user-select:none;
}

.zoom-indicator button{
  width:24px;height:24px;border:1px solid var(--border);border-radius:4px;
  background:var(--bg3);color:var(--text);cursor:pointer;font-size:14px;
  display:flex;align-items:center;justify-content:center;
}
.zoom-indicator button:hover{background:var(--bg4)}

/* Coords */
.coords{
  position:absolute;bottom:14px;left:14px;
  background:var(--bg2);border:1px solid var(--border);
  border-radius:var(--radius);padding:5px 12px;
  font-size:11px;color:var(--text3);z-index:30;
  font-family:'SF Mono',Consolas,monospace;
}

/* ===== RIGHT PANEL (PROPERTIES) ===== */
.props-panel{
  width:240px;background:var(--bg2);border-left:1px solid var(--border);
  flex-shrink:0;overflow-y:auto;display:none;flex-direction:column;
}

.props-panel.show{display:flex}

.props-header{
  padding:12px 14px;font-weight:600;font-size:12px;
  text-transform:uppercase;letter-spacing:1px;color:var(--text3);
  border-bottom:1px solid var(--border);
}

.props-body{padding:12px}

.prop-row{margin-bottom:10px}
.prop-label{font-size:11px;font-weight:600;color:var(--text3);margin-bottom:4px;text-transform:uppercase;letter-spacing:0.5px}
.prop-input{
  width:100%;padding:6px 8px;border-radius:4px;
  background:var(--bg);border:1px solid var(--border);
  color:var(--text);font-family:inherit;font-size:12px;outline:none;
}
.prop-input:focus{border-color:var(--accent)}

.prop-colors{display:flex;gap:4px;flex-wrap:wrap}
.prop-color{
  width:24px;height:24px;border-radius:4px;cursor:pointer;
  border:2px solid transparent;transition:all 0.15s;
}
.prop-color:hover{transform:scale(1.1)}
.prop-color.active{border-color:#fff;box-shadow:0 0 0 1px var(--bg)}

/* ===== CONTEXT MENU ===== */
.ctx-menu{
  position:fixed;background:var(--bg2);border:1px solid var(--border);
  border-radius:var(--radius);padding:4px;min-width:160px;
  box-shadow:0 8px 30px rgba(0,0,0,0.4);z-index:500;display:none;
}

.ctx-menu.show{display:block}

.ctx-item{
  padding:7px 12px;border-radius:4px;font-size:12px;cursor:pointer;
  display:flex;align-items:center;gap:8px;color:var(--text);
}
.ctx-item:hover{background:var(--bg3)}
.ctx-item.danger{color:var(--red)}
.ctx-item.danger:hover{background:rgba(255,77,106,0.1)}
.ctx-item .shortcut{margin-left:auto;color:var(--text3);font-size:11px}

.ctx-sep{height:1px;background:var(--border);margin:4px 8px}

/* ===== MODAL ===== */
.modal-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,0.6);
  display:none;align-items:center;justify-content:center;z-index:600;
}
.modal-overlay.show{display:flex}

.modal{
  background:var(--bg2);border:1px solid var(--border);border-radius:10px;
  padding:24px;min-width:340px;max-width:90vw;box-shadow:0 20px 60px rgba(0,0,0,0.5);
}

.modal h3{font-size:16px;margin-bottom:14px}
.modal .modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:16px}

.modal .mbtn{
  padding:8px 18px;border-radius:var(--radius);font-family:inherit;font-size:12px;
  font-weight:600;cursor:pointer;border:1px solid var(--border);transition:all 0.15s;
}
.mbtn-cancel{background:var(--bg3);color:var(--text)}
.mbtn-cancel:hover{background:var(--bg4)}
.mbtn-primary{background:var(--accent);border-color:var(--accent);color:#fff}
.mbtn-primary:hover{background:var(--accent2)}

/* Scrollbar */
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--border2)}

/* Toast */
.toast{
  position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(80px);
  background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);
  padding:10px 20px;font-size:12px;font-weight:500;color:var(--text);
  box-shadow:0 8px 30px rgba(0,0,0,0.4);z-index:700;
  transition:transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
  white-space:nowrap;
}
.toast.show{transform:translateX(-50%) translateY(0)}

/* Empty state */
.empty-state{
  position:absolute;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;pointer-events:none;z-index:5;
}
.empty-state h2{font-size:20px;font-weight:700;color:var(--text2);margin-bottom:6px}
.empty-state p{color:var(--text3);font-size:13px;text-align:center;line-height:1.6}
.empty-state .keys{
  margin-top:14px;display:flex;gap:8px;flex-wrap:wrap;justify-content:center;
}
.empty-state .key{
  padding:4px 10px;border-radius:4px;background:var(--bg3);
  border:1px solid var(--border);font-size:11px;color:var(--text2);font-weight:500;
}
</style>
</head>
<body>

<!-- TOOLBAR -->
<div class="toolbar">
  <div class="brand">MISSION MAKER</div>
  <div class="sep"></div>

  <div class="tool-group">
    <button class="tool-btn active" data-tool="select" title="Select / Move (V)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 3l7.07 16.97 2.51-7.39 7.39-2.51L3 3z"/></svg>
      <span>Select</span>
    </button>
    <button class="tool-btn" data-tool="pan" title="Pan (Space+Drag)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 11V6a2 2 0 00-4 0v5m0 0V4a2 2 0 00-4 0v7m0 0V7a2 2 0 00-4 0v7m0 0l-1.76-1.76a2 2 0 00-2.83 2.83L8 22h10l2.83-8.49A2 2 0 0019 11.5V11a2 2 0 00-4 0"/></svg>
      <span>Pan</span>
    </button>
  </div>

  <div class="sep"></div>

  <div class="tool-group">
    <button class="tool-btn" data-tool="marker" title="Place Marker (M)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>
      <span>Marker</span>
    </button>
    <button class="tool-btn" data-tool="label" title="Text Label (T)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 7V4h16v3M9 20h6M12 4v16"/></svg>
      <span>Label</span>
    </button>
  </div>

  <div class="sep"></div>

  <div class="tool-group">
    <button class="tool-btn" data-tool="line" title="Draw Line (L)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="5" y1="19" x2="19" y2="5"/></svg>
      <span>Line</span>
    </button>
    <button class="tool-btn" data-tool="arrow" title="Draw Arrow (A)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
      <span>Arrow</span>
    </button>
    <button class="tool-btn" data-tool="route" title="Movement Route (R)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
      <span>Route</span>
    </button>
    <button class="tool-btn" data-tool="zone" title="Draw Zone (Z)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" opacity="0.5"/></svg>
      <span>Zone</span>
    </button>
    <button class="tool-btn" data-tool="freehand" title="Freehand Draw (F)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 19l7-7 3 3-7 7-3-3z"/><path d="M18 13l-1.5-7.5L2 2l3.5 14.5L13 18l5-5z"/></svg>
      <span>Draw</span>
    </button>
  </div>

  <div class="sep"></div>

  <div class="tool-group">
    <button class="tool-btn" data-tool="breach" title="Breach Point (B)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
      <span>Breach</span>
    </button>
    <button class="tool-btn" data-tool="threat" title="Threat Marker">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
      <span>Threat</span>
    </button>
  </div>

  <div class="spacer"></div>

  <!-- Active color -->
  <input type="color" id="color-pick" class="color-swatch" value="#4f8fff" title="Drawing Color">
  <select class="size-select" id="stroke-size" title="Stroke Size">
    <option value="2">2px</option>
    <option value="3" selected>3px</option>
    <option value="4">4px</option>
    <option value="6">6px</option>
    <option value="8">8px</option>
  </select>

  <div class="sep"></div>

  <button class="tool-btn" id="btn-undo" title="Undo (Ctrl+Z)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 102.13-9.36L1 10"/></svg>
  </button>
  <button class="tool-btn" id="btn-redo" title="Redo (Ctrl+Y)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 11-2.13-9.36L23 10"/></svg>
  </button>

  <div class="sep"></div>

  <button class="tool-btn" id="btn-save" title="Save Project">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
    <span>Save</span>
  </button>
  <button class="tool-btn" id="btn-load" title="Load Project">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/></svg>
    <span>Load</span>
  </button>
  <button class="tool-btn" id="btn-export" title="Export as Image">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
    <span>Export</span>
  </button>
</div>

<!-- MAIN -->
<div class="main">
  <!-- LEFT SIDEBAR -->
  <div class="sidebar">
    <div class="sidebar-header">
      Layers
      <button class="add-btn" id="btn-add-layer" title="Add image layer">+</button>
    </div>
    <div class="layers-list" id="layers-list"></div>
    <div class="floor-tabs">
      <div class="floor-tabs-label">
        Floors
        <button class="add-btn" id="btn-add-floor" title="Add floor" style="width:20px;height:20px;font-size:13px">+</button>
      </div>
      <div class="floor-tabs-row" id="floor-tabs"></div>
    </div>
  </div>

  <!-- CANVAS -->
  <div class="canvas-wrap" id="canvas-wrap">
    <canvas id="canvas"></canvas>

    <div class="drop-overlay" id="drop-overlay">
      <div class="drop-text">
        <h3>Drop Image Here</h3>
        <p>Map image, aerial photo, floor plan...</p>
      </div>
    </div>

    <div class="empty-state" id="empty-state">
      <h2>Mission Maker</h2>
      <p>Paste or drop a map image to get started.<br>Add markers, routes, and plan operations.</p>
      <div class="keys">
        <span class="key">Ctrl+V paste image</span>
        <span class="key">Drop image file</span>
        <span class="key">Scroll to zoom</span>
        <span class="key">Space+drag to pan</span>
      </div>
    </div>

    <div class="coords" id="coords">0, 0</div>
    <div class="zoom-indicator">
      <button id="zoom-out">-</button>
      <span id="zoom-level">100%</span>
      <button id="zoom-in">+</button>
    </div>
  </div>

  <!-- RIGHT PANEL -->
  <div class="props-panel" id="props-panel">
    <div class="props-header">Properties</div>
    <div class="props-body" id="props-body"></div>
  </div>
</div>

<!-- CONTEXT MENU -->
<div class="ctx-menu" id="ctx-menu"></div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<!-- HIDDEN FILE INPUT -->
<input type="file" id="file-input" accept="image/*" style="display:none" multiple>
<input type="file" id="load-input" accept=".json" style="display:none">

<script>
// ================================================================
// STATE
// ================================================================
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const wrap = document.getElementById('canvas-wrap');

let W = 0, H = 0;
let cam = { x: 0, y: 0, zoom: 1 };

let floors = [{ id: 'f1', name: 'Floor 1' }];
let activeFloor = 'f1';

let layers = [];  // { id, name, floor, type:'image'|'objects', visible, image?, imageData?, objects?, opacity }
let activeLayerId = null;

let objects = []; // { id, type, floor, layerId, x, y, x2?, y2?, points?, text?, color, size, markerType?, selected? }

let currentTool = 'select';
let drawColor = '#4f8fff';
let strokeSize = 3;

let undoStack = [];
let redoStack = [];

let dragState = null;
let drawing = null;
let spaceDown = false;
let isPanning = false;
let panStart = null;
let hovered = null;
let selected = [];

let objIdCounter = 1;
let layerIdCounter = 1;
let floorIdCounter = 2;

const MARKER_TYPES = {
  marker: { icon: 'pin', label: 'Marker' },
  breach: { icon: 'cross', label: 'Breach Point' },
  threat: { icon: 'triangle', label: 'Threat' },
  label:  { icon: 'text', label: 'Label' }
};

const TEAM_COLORS = ['#4f8fff','#ff4d6a','#34d399','#fbbf24','#a855f7','#22d3ee','#f97316','#ec4899','#fff'];

// ================================================================
// INIT
// ================================================================
function init() {
  resize();
  window.addEventListener('resize', resize);
  setupCanvas();
  setupToolbar();
  setupSidebar();
  setupDragDrop();
  setupPaste();
  setupKeyboard();
  renderLayers();
  renderFloors();
  render();
}

function resize() {
  W = wrap.clientWidth;
  H = wrap.clientHeight;
  canvas.width = W * devicePixelRatio;
  canvas.height = H * devicePixelRatio;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  ctx.setTransform(devicePixelRatio, 0, 0, devicePixelRatio, 0, 0);
  render();
}

// ================================================================
// CAMERA
// ================================================================
function screenToWorld(sx, sy) {
  return {
    x: (sx - cam.x) / cam.zoom,
    y: (sy - cam.y) / cam.zoom
  };
}

function worldToScreen(wx, wy) {
  return {
    x: wx * cam.zoom + cam.x,
    y: wy * cam.zoom + cam.y
  };
}

// ================================================================
// RENDER
// ================================================================
function render() {
  ctx.clearRect(0, 0, W, H);

  // Background
  ctx.fillStyle = '#0d0d14';
  ctx.fillRect(0, 0, W, H);

  // Grid
  drawGrid();

  ctx.save();
  ctx.translate(cam.x, cam.y);
  ctx.scale(cam.zoom, cam.zoom);

  // Draw image layers for active floor
  for (const layer of layers) {
    if (!layer.visible || layer.floor !== activeFloor) continue;
    if (layer.type === 'image' && layer.image) {
      ctx.globalAlpha = layer.opacity !== undefined ? layer.opacity : 1;
      ctx.drawImage(layer.image, layer.ox || 0, layer.oy || 0, layer.iw || layer.image.width, layer.ih || layer.image.height);
      ctx.globalAlpha = 1;
    }
  }

  // Draw objects for active floor
  const floorObjs = objects.filter(o => o.floor === activeFloor);
  for (const obj of floorObjs) {
    const layer = layers.find(l => l.id === obj.layerId);
    if (layer && !layer.visible) continue;
    drawObject(obj);
  }

  // Drawing in progress
  if (drawing) drawObject(drawing);

  ctx.restore();

  // Empty state
  const hasContent = layers.some(l => l.floor === activeFloor && l.type === 'image') || floorObjs.length > 0;
  document.getElementById('empty-state').style.display = hasContent ? 'none' : '';
}

function drawGrid() {
  const gridSize = 50 * cam.zoom;
  if (gridSize < 8) return;

  ctx.strokeStyle = 'rgba(255,255,255,0.03)';
  ctx.lineWidth = 1;

  const offX = cam.x % gridSize;
  const offY = cam.y % gridSize;

  ctx.beginPath();
  for (let x = offX; x < W; x += gridSize) {
    ctx.moveTo(Math.round(x) + 0.5, 0);
    ctx.lineTo(Math.round(x) + 0.5, H);
  }
  for (let y = offY; y < H; y += gridSize) {
    ctx.moveTo(0, Math.round(y) + 0.5);
    ctx.lineTo(W, Math.round(y) + 0.5);
  }
  ctx.stroke();
}

function drawObject(obj) {
  const isSelected = selected.includes(obj.id) || (obj === drawing);
  ctx.strokeStyle = obj.color || drawColor;
  ctx.fillStyle = obj.color || drawColor;
  ctx.lineWidth = (obj.size || strokeSize) / cam.zoom;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';

  switch (obj.type) {
    case 'marker':
      drawMarker(obj, isSelected);
      break;
    case 'breach':
      drawBreach(obj, isSelected);
      break;
    case 'threat':
      drawThreat(obj, isSelected);
      break;
    case 'label':
      drawLabel(obj, isSelected);
      break;
    case 'line':
      drawLine(obj, isSelected);
      break;
    case 'arrow':
      drawArrow(obj, isSelected);
      break;
    case 'route':
      drawRoute(obj, isSelected);
      break;
    case 'zone':
      drawZone(obj, isSelected);
      break;
    case 'freehand':
      drawFreehand(obj, isSelected);
      break;
  }

  if (isSelected && obj !== drawing) {
    drawSelectionBox(obj);
  }
}

function drawMarker(obj, sel) {
  const s = 12 / cam.zoom;
  ctx.beginPath();
  ctx.arc(obj.x, obj.y, s * 0.5, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(obj.x, obj.y, s * 0.5, 0, Math.PI * 2);
  ctx.strokeStyle = 'rgba(0,0,0,0.4)';
  ctx.lineWidth = 2 / cam.zoom;
  ctx.stroke();

  // Outer ring
  ctx.beginPath();
  ctx.arc(obj.x, obj.y, s, 0, Math.PI * 2);
  ctx.strokeStyle = obj.color || drawColor;
  ctx.lineWidth = 2 / cam.zoom;
  ctx.stroke();

  if (obj.text) {
    ctx.font = `600 ${12 / cam.zoom}px Inter, sans-serif`;
    ctx.fillStyle = obj.color || drawColor;
    ctx.textAlign = 'center';
    ctx.fillText(obj.text, obj.x, obj.y - s - 6 / cam.zoom);
  }
}

function drawBreach(obj, sel) {
  const s = 14 / cam.zoom;
  ctx.strokeStyle = obj.color || '#ff4d6a';
  ctx.lineWidth = 3 / cam.zoom;

  // Circle
  ctx.beginPath();
  ctx.arc(obj.x, obj.y, s, 0, Math.PI * 2);
  ctx.stroke();

  // Cross
  ctx.beginPath();
  ctx.moveTo(obj.x - s * 0.5, obj.y);
  ctx.lineTo(obj.x + s * 0.5, obj.y);
  ctx.moveTo(obj.x, obj.y - s * 0.5);
  ctx.lineTo(obj.x, obj.y + s * 0.5);
  ctx.stroke();

  if (obj.text) {
    ctx.font = `600 ${11 / cam.zoom}px Inter, sans-serif`;
    ctx.fillStyle = obj.color || '#ff4d6a';
    ctx.textAlign = 'center';
    ctx.fillText(obj.text, obj.x, obj.y - s - 6 / cam.zoom);
  }
}

function drawThreat(obj, sel) {
  const s = 14 / cam.zoom;
  ctx.fillStyle = obj.color || '#fbbf24';
  ctx.strokeStyle = 'rgba(0,0,0,0.3)';
  ctx.lineWidth = 1.5 / cam.zoom;

  ctx.beginPath();
  ctx.moveTo(obj.x, obj.y - s);
  ctx.lineTo(obj.x + s * 0.9, obj.y + s * 0.6);
  ctx.lineTo(obj.x - s * 0.9, obj.y + s * 0.6);
  ctx.closePath();
  ctx.fill();
  ctx.stroke();

  // Exclamation
  ctx.fillStyle = '#000';
  ctx.font = `800 ${12 / cam.zoom}px Inter, sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('!', obj.x, obj.y + 1 / cam.zoom);
  ctx.textBaseline = 'alphabetic';

  if (obj.text) {
    ctx.font = `600 ${11 / cam.zoom}px Inter, sans-serif`;
    ctx.fillStyle = obj.color || '#fbbf24';
    ctx.textAlign = 'center';
    ctx.fillText(obj.text, obj.x, obj.y - s - 6 / cam.zoom);
  }
}

function drawLabel(obj, sel) {
  const text = obj.text || 'Label';
  const fontSize = (obj.fontSize || 14) / cam.zoom;
  ctx.font = `700 ${fontSize}px Inter, sans-serif`;
  ctx.fillStyle = obj.color || drawColor;
  ctx.textAlign = 'left';

  // Background
  const m = ctx.measureText(text);
  const pad = 4 / cam.zoom;
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.fillRect(obj.x - pad, obj.y - fontSize - pad, m.width + pad * 2, fontSize + pad * 2);

  ctx.fillStyle = obj.color || drawColor;
  ctx.fillText(text, obj.x, obj.y);
}

function drawLine(obj, sel) {
  if (obj.x2 === undefined) return;
  ctx.beginPath();
  ctx.moveTo(obj.x, obj.y);
  ctx.lineTo(obj.x2, obj.y2);
  ctx.stroke();
}

function drawArrow(obj, sel) {
  if (obj.x2 === undefined) return;
  ctx.beginPath();
  ctx.moveTo(obj.x, obj.y);
  ctx.lineTo(obj.x2, obj.y2);
  ctx.stroke();

  // Arrowhead
  const angle = Math.atan2(obj.y2 - obj.y, obj.x2 - obj.x);
  const hs = 12 / cam.zoom;
  ctx.beginPath();
  ctx.moveTo(obj.x2, obj.y2);
  ctx.lineTo(obj.x2 - hs * Math.cos(angle - 0.4), obj.y2 - hs * Math.sin(angle - 0.4));
  ctx.lineTo(obj.x2 - hs * Math.cos(angle + 0.4), obj.y2 - hs * Math.sin(angle + 0.4));
  ctx.closePath();
  ctx.fill();
}

function drawRoute(obj, sel) {
  if (!obj.points || obj.points.length < 2) return;
  ctx.setLineDash([8 / cam.zoom, 5 / cam.zoom]);
  ctx.beginPath();
  ctx.moveTo(obj.points[0].x, obj.points[0].y);
  for (let i = 1; i < obj.points.length; i++) {
    ctx.lineTo(obj.points[i].x, obj.points[i].y);
  }
  ctx.stroke();
  ctx.setLineDash([]);

  // Arrow at end
  if (obj.points.length >= 2) {
    const last = obj.points[obj.points.length - 1];
    const prev = obj.points[obj.points.length - 2];
    const angle = Math.atan2(last.y - prev.y, last.x - prev.x);
    const hs = 10 / cam.zoom;
    ctx.beginPath();
    ctx.moveTo(last.x, last.y);
    ctx.lineTo(last.x - hs * Math.cos(angle - 0.4), last.y - hs * Math.sin(angle - 0.4));
    ctx.lineTo(last.x - hs * Math.cos(angle + 0.4), last.y - hs * Math.sin(angle + 0.4));
    ctx.closePath();
    ctx.fill();
  }

  // Waypoint dots
  for (const p of obj.points) {
    ctx.beginPath();
    ctx.arc(p.x, p.y, 3 / cam.zoom, 0, Math.PI * 2);
    ctx.fill();
  }

  if (obj.text) {
    const mid = obj.points[Math.floor(obj.points.length / 2)];
    ctx.font = `600 ${11 / cam.zoom}px Inter, sans-serif`;
    ctx.fillStyle = obj.color || drawColor;
    ctx.textAlign = 'center';
    ctx.fillText(obj.text, mid.x, mid.y - 10 / cam.zoom);
  }
}

function drawZone(obj, sel) {
  if (obj.x2 === undefined) return;
  const x = Math.min(obj.x, obj.x2);
  const y = Math.min(obj.y, obj.y2);
  const w = Math.abs(obj.x2 - obj.x);
  const h = Math.abs(obj.y2 - obj.y);

  ctx.fillStyle = hexToRgba(obj.color || drawColor, 0.12);
  ctx.fillRect(x, y, w, h);
  ctx.strokeRect(x, y, w, h);

  if (obj.text) {
    ctx.font = `600 ${12 / cam.zoom}px Inter, sans-serif`;
    ctx.fillStyle = obj.color || drawColor;
    ctx.textAlign = 'center';
    ctx.fillText(obj.text, x + w / 2, y - 6 / cam.zoom);
  }
}

function drawFreehand(obj, sel) {
  if (!obj.points || obj.points.length < 2) return;
  ctx.beginPath();
  ctx.moveTo(obj.points[0].x, obj.points[0].y);
  for (let i = 1; i < obj.points.length; i++) {
    ctx.lineTo(obj.points[i].x, obj.points[i].y);
  }
  ctx.stroke();
}

function drawSelectionBox(obj) {
  ctx.save();
  ctx.strokeStyle = '#4f8fff';
  ctx.lineWidth = 1.5 / cam.zoom;
  ctx.setLineDash([4 / cam.zoom, 4 / cam.zoom]);

  const bb = getBounds(obj);
  if (bb) {
    const pad = 6 / cam.zoom;
    ctx.strokeRect(bb.x - pad, bb.y - pad, bb.w + pad * 2, bb.h + pad * 2);
  }

  ctx.setLineDash([]);
  ctx.restore();
}

function getBounds(obj) {
  switch (obj.type) {
    case 'marker': case 'breach': case 'threat':
      const s = 20 / cam.zoom;
      return { x: obj.x - s, y: obj.y - s, w: s * 2, h: s * 2 };
    case 'label':
      return { x: obj.x - 4, y: obj.y - 20, w: 100, h: 24 };
    case 'line': case 'arrow':
      if (obj.x2 === undefined) return null;
      const lx = Math.min(obj.x, obj.x2);
      const ly = Math.min(obj.y, obj.y2);
      return { x: lx, y: ly, w: Math.abs(obj.x2 - obj.x) || 10, h: Math.abs(obj.y2 - obj.y) || 10 };
    case 'zone':
      if (obj.x2 === undefined) return null;
      const zx = Math.min(obj.x, obj.x2);
      const zy = Math.min(obj.y, obj.y2);
      return { x: zx, y: zy, w: Math.abs(obj.x2 - obj.x), h: Math.abs(obj.y2 - obj.y) };
    case 'route': case 'freehand':
      if (!obj.points || !obj.points.length) return null;
      let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
      for (const p of obj.points) {
        minX = Math.min(minX, p.x); minY = Math.min(minY, p.y);
        maxX = Math.max(maxX, p.x); maxY = Math.max(maxY, p.y);
      }
      return { x: minX, y: minY, w: maxX - minX || 10, h: maxY - minY || 10 };
  }
  return null;
}

function hexToRgba(hex, a) {
  const r = parseInt(hex.slice(1, 3), 16);
  const g = parseInt(hex.slice(3, 5), 16);
  const b = parseInt(hex.slice(5, 7), 16);
  return `rgba(${r},${g},${b},${a})`;
}

// ================================================================
// HIT TESTING
// ================================================================
function hitTest(wx, wy) {
  const floorObjs = objects.filter(o => o.floor === activeFloor).reverse();
  for (const obj of floorObjs) {
    const layer = layers.find(l => l.id === obj.layerId);
    if (layer && !layer.visible) continue;
    if (hitObj(obj, wx, wy)) return obj;
  }
  return null;
}

function hitObj(obj, wx, wy) {
  const thresh = 12 / cam.zoom;
  switch (obj.type) {
    case 'marker': case 'breach': case 'threat':
      return Math.hypot(wx - obj.x, wy - obj.y) < 20 / cam.zoom;
    case 'label':
      return wx >= obj.x - 4 && wx <= obj.x + 100 && wy >= obj.y - 20 && wy <= obj.y + 4;
    case 'line': case 'arrow':
      if (obj.x2 === undefined) return false;
      return distToSegment(wx, wy, obj.x, obj.y, obj.x2, obj.y2) < thresh;
    case 'zone':
      if (obj.x2 === undefined) return false;
      const zx = Math.min(obj.x, obj.x2), zy = Math.min(obj.y, obj.y2);
      const zw = Math.abs(obj.x2 - obj.x), zh = Math.abs(obj.y2 - obj.y);
      return wx >= zx && wx <= zx + zw && wy >= zy && wy <= zy + zh;
    case 'route': case 'freehand':
      if (!obj.points) return false;
      for (let i = 1; i < obj.points.length; i++) {
        if (distToSegment(wx, wy, obj.points[i-1].x, obj.points[i-1].y, obj.points[i].x, obj.points[i].y) < thresh) return true;
      }
      return false;
  }
  return false;
}

function distToSegment(px, py, x1, y1, x2, y2) {
  const dx = x2 - x1, dy = y2 - y1;
  const len2 = dx * dx + dy * dy;
  if (len2 === 0) return Math.hypot(px - x1, py - y1);
  let t = ((px - x1) * dx + (py - y1) * dy) / len2;
  t = Math.max(0, Math.min(1, t));
  return Math.hypot(px - (x1 + t * dx), py - (y1 + t * dy));
}

// ================================================================
// CANVAS EVENTS
// ================================================================
function setupCanvas() {
  canvas.addEventListener('wheel', onWheel, { passive: false });
  canvas.addEventListener('mousedown', onMouseDown);
  canvas.addEventListener('mousemove', onMouseMove);
  canvas.addEventListener('mouseup', onMouseUp);
  canvas.addEventListener('dblclick', onDblClick);
  canvas.addEventListener('contextmenu', onContextMenu);
}

function onWheel(e) {
  e.preventDefault();
  const rect = wrap.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;

  const oldZoom = cam.zoom;
  const delta = e.deltaY > 0 ? 0.9 : 1.1;
  cam.zoom = Math.max(0.05, Math.min(20, cam.zoom * delta));

  cam.x = mx - (mx - cam.x) * (cam.zoom / oldZoom);
  cam.y = my - (my - cam.y) * (cam.zoom / oldZoom);

  document.getElementById('zoom-level').textContent = Math.round(cam.zoom * 100) + '%';
  render();
}

function onMouseDown(e) {
  if (e.button === 1 || (e.button === 0 && (spaceDown || currentTool === 'pan'))) {
    isPanning = true;
    panStart = { x: e.clientX, y: e.clientY, cx: cam.x, cy: cam.y };
    canvas.style.cursor = 'grabbing';
    return;
  }

  if (e.button !== 0) return;

  const rect = wrap.getBoundingClientRect();
  const sx = e.clientX - rect.left;
  const sy = e.clientY - rect.top;
  const w = screenToWorld(sx, sy);

  closeContextMenu();

  if (currentTool === 'select') {
    const hit = hitTest(w.x, w.y);
    if (hit) {
      if (!selected.includes(hit.id)) {
        selected = [hit.id];
        showProperties(hit);
      }
      dragState = { obj: hit, startX: w.x, startY: w.y, origX: hit.x, origY: hit.y };
      render();
    } else {
      selected = [];
      hideProperties();
      render();
    }
    return;
  }

  // Drawing tools
  const objLayer = getOrCreateObjectLayer();

  if (['marker', 'breach', 'threat'].includes(currentTool)) {
    pushUndo();
    const obj = {
      id: objIdCounter++,
      type: currentTool,
      floor: activeFloor,
      layerId: objLayer.id,
      x: w.x, y: w.y,
      color: currentTool === 'breach' ? '#ff4d6a' : currentTool === 'threat' ? '#fbbf24' : drawColor,
      size: strokeSize,
      text: ''
    };
    objects.push(obj);
    selected = [obj.id];
    showProperties(obj);
    render();
    return;
  }

  if (currentTool === 'label') {
    pushUndo();
    const text = prompt('Enter label text:', 'Label');
    if (!text) return;
    const obj = {
      id: objIdCounter++,
      type: 'label',
      floor: activeFloor,
      layerId: objLayer.id,
      x: w.x, y: w.y,
      color: drawColor,
      size: strokeSize,
      fontSize: 14,
      text
    };
    objects.push(obj);
    selected = [obj.id];
    showProperties(obj);
    render();
    return;
  }

  if (['line', 'arrow', 'zone'].includes(currentTool)) {
    drawing = {
      id: -1,
      type: currentTool,
      floor: activeFloor,
      layerId: objLayer.id,
      x: w.x, y: w.y,
      x2: w.x, y2: w.y,
      color: drawColor,
      size: strokeSize,
      text: ''
    };
    render();
    return;
  }

  if (currentTool === 'route') {
    if (!drawing) {
      drawing = {
        id: -1,
        type: 'route',
        floor: activeFloor,
        layerId: objLayer.id,
        x: w.x, y: w.y,
        points: [{ x: w.x, y: w.y }],
        color: drawColor,
        size: strokeSize,
        text: ''
      };
    } else {
      drawing.points.push({ x: w.x, y: w.y });
    }
    render();
    return;
  }

  if (currentTool === 'freehand') {
    drawing = {
      id: -1,
      type: 'freehand',
      floor: activeFloor,
      layerId: objLayer.id,
      x: w.x, y: w.y,
      points: [{ x: w.x, y: w.y }],
      color: drawColor,
      size: strokeSize
    };
    render();
    return;
  }
}

function onMouseMove(e) {
  const rect = wrap.getBoundingClientRect();
  const sx = e.clientX - rect.left;
  const sy = e.clientY - rect.top;
  const w = screenToWorld(sx, sy);

  document.getElementById('coords').textContent = `${Math.round(w.x)}, ${Math.round(w.y)}`;

  if (isPanning && panStart) {
    cam.x = panStart.cx + (e.clientX - panStart.x);
    cam.y = panStart.cy + (e.clientY - panStart.y);
    render();
    return;
  }

  if (dragState) {
    const dx = w.x - dragState.startX;
    const dy = w.y - dragState.startY;
    const obj = dragState.obj;

    if (!dragState.pushed) { pushUndo(); dragState.pushed = true; }

    obj.x = dragState.origX + dx;
    obj.y = dragState.origY + dy;

    // Move connected points too
    if (obj.points) {
      if (!dragState.origPoints) {
        dragState.origPoints = obj.points.map(p => ({ ...p }));
      }
      obj.points = dragState.origPoints.map(p => ({ x: p.x + dx, y: p.y + dy }));
    }
    if (obj.x2 !== undefined) {
      if (dragState.origX2 === undefined) {
        dragState.origX2 = obj.x2;
        dragState.origY2 = obj.y2;
      }
      obj.x2 = dragState.origX2 + dx;
      obj.y2 = dragState.origY2 + dy;
    }

    render();
    return;
  }

  if (drawing) {
    if (['line', 'arrow', 'zone'].includes(drawing.type)) {
      drawing.x2 = w.x;
      drawing.y2 = w.y;
      render();
    } else if (drawing.type === 'freehand') {
      drawing.points.push({ x: w.x, y: w.y });
      render();
    }
    return;
  }

  // Hover cursor
  if (currentTool === 'select') {
    const hit = hitTest(w.x, w.y);
    canvas.style.cursor = hit ? 'move' : 'default';
  } else if (currentTool === 'pan') {
    canvas.style.cursor = 'grab';
  } else {
    canvas.style.cursor = 'crosshair';
  }
}

function onMouseUp(e) {
  if (isPanning) {
    isPanning = false;
    panStart = null;
    canvas.style.cursor = currentTool === 'pan' ? 'grab' : 'default';
    return;
  }

  if (dragState) {
    dragState = null;
    return;
  }

  if (drawing && ['line', 'arrow', 'zone'].includes(drawing.type)) {
    pushUndo();
    drawing.id = objIdCounter++;
    objects.push(drawing);
    selected = [drawing.id];
    showProperties(drawing);
    drawing = null;
    render();
    return;
  }

  if (drawing && drawing.type === 'freehand') {
    pushUndo();
    drawing.id = objIdCounter++;
    objects.push(drawing);
    selected = [drawing.id];
    drawing = null;
    render();
    return;
  }
}

function onDblClick(e) {
  if (currentTool === 'route' && drawing) {
    pushUndo();
    drawing.id = objIdCounter++;
    objects.push(drawing);
    selected = [drawing.id];
    showProperties(drawing);
    drawing = null;
    render();
    return;
  }

  // Double-click to edit text on select mode
  if (currentTool === 'select') {
    const rect = wrap.getBoundingClientRect();
    const w = screenToWorld(e.clientX - rect.left, e.clientY - rect.top);
    const hit = hitTest(w.x, w.y);
    if (hit && (hit.text !== undefined)) {
      const text = prompt('Edit text:', hit.text || '');
      if (text !== null) {
        pushUndo();
        hit.text = text;
        render();
        showProperties(hit);
      }
    }
  }
}

function onContextMenu(e) {
  e.preventDefault();
  const rect = wrap.getBoundingClientRect();
  const w = screenToWorld(e.clientX - rect.left, e.clientY - rect.top);
  const hit = hitTest(w.x, w.y);

  if (hit) {
    selected = [hit.id];
    render();
    showContextMenu(e.clientX, e.clientY, hit);
  } else {
    showContextMenu(e.clientX, e.clientY, null);
  }
}

// ================================================================
// CONTEXT MENU
// ================================================================
function showContextMenu(x, y, obj) {
  const menu = document.getElementById('ctx-menu');
  let html = '';

  if (obj) {
    if (obj.text !== undefined) {
      html += `<div class="ctx-item" onclick="editObjText(${obj.id})">Edit Label</div>`;
    }
    html += `<div class="ctx-item" onclick="duplicateObj(${obj.id})">Duplicate</div>`;
    html += `<div class="ctx-sep"></div>`;
    html += `<div class="ctx-item danger" onclick="deleteObj(${obj.id})">Delete <span class="shortcut">Del</span></div>`;
  } else {
    html += `<div class="ctx-item" onclick="pasteImagePrompt()">Paste Image <span class="shortcut">Ctrl+V</span></div>`;
    html += `<div class="ctx-item" onclick="document.getElementById('file-input').click()">Upload Image</div>`;
  }

  menu.innerHTML = html;
  menu.style.left = x + 'px';
  menu.style.top = y + 'px';
  menu.classList.add('show');

  setTimeout(() => document.addEventListener('click', closeContextMenu, { once: true }), 10);
}

function closeContextMenu() {
  document.getElementById('ctx-menu').classList.remove('show');
}

function editObjText(id) {
  const obj = objects.find(o => o.id === id);
  if (!obj) return;
  const text = prompt('Edit text:', obj.text || '');
  if (text !== null) { pushUndo(); obj.text = text; render(); showProperties(obj); }
  closeContextMenu();
}

function duplicateObj(id) {
  const obj = objects.find(o => o.id === id);
  if (!obj) return;
  pushUndo();
  const clone = JSON.parse(JSON.stringify(obj));
  clone.id = objIdCounter++;
  clone.x += 20;
  clone.y += 20;
  if (clone.x2 !== undefined) { clone.x2 += 20; clone.y2 += 20; }
  if (clone.points) clone.points = clone.points.map(p => ({ x: p.x + 20, y: p.y + 20 }));
  objects.push(clone);
  selected = [clone.id];
  render();
  closeContextMenu();
}

function deleteObj(id) {
  pushUndo();
  objects = objects.filter(o => o.id !== id);
  selected = selected.filter(s => s !== id);
  hideProperties();
  render();
  closeContextMenu();
}

// ================================================================
// PROPERTIES PANEL
// ================================================================
function showProperties(obj) {
  const panel = document.getElementById('props-panel');
  const body = document.getElementById('props-body');
  panel.classList.add('show');

  let html = '';

  if (obj.text !== undefined) {
    html += `<div class="prop-row">
      <div class="prop-label">Label</div>
      <input class="prop-input" value="${escHtml(obj.text)}" onchange="propChange(${obj.id},'text',this.value)">
    </div>`;
  }

  html += `<div class="prop-row">
    <div class="prop-label">Color</div>
    <div class="prop-colors">
      ${TEAM_COLORS.map(c => `<div class="prop-color${(obj.color||drawColor)===c?' active':''}" style="background:${c}" onclick="propChange(${obj.id},'color','${c}')"></div>`).join('')}
    </div>
  </div>`;

  if (obj.type === 'label') {
    html += `<div class="prop-row">
      <div class="prop-label">Font Size</div>
      <input class="prop-input" type="number" value="${obj.fontSize||14}" min="8" max="72" onchange="propChange(${obj.id},'fontSize',+this.value)">
    </div>`;
  }

  html += `<div class="prop-row">
    <div class="prop-label">Type</div>
    <div style="font-size:12px;color:var(--text2);text-transform:capitalize">${obj.type}</div>
  </div>`;

  html += `<div class="prop-row" style="margin-top:16px">
    <button class="mbtn mbtn-cancel" style="width:100%;text-align:center" onclick="deleteObj(${obj.id})">Delete Object</button>
  </div>`;

  body.innerHTML = html;
}

function hideProperties() {
  document.getElementById('props-panel').classList.remove('show');
}

function propChange(id, prop, value) {
  const obj = objects.find(o => o.id === id);
  if (!obj) return;
  pushUndo();
  obj[prop] = value;
  render();
  showProperties(obj);
}

function escHtml(s) { return s.replace(/"/g, '&quot;').replace(/</g, '&lt;'); }

// ================================================================
// LAYERS
// ================================================================
function getOrCreateObjectLayer() {
  let layer = layers.find(l => l.floor === activeFloor && l.type === 'objects' && l.visible);
  if (!layer) {
    layer = { id: 'layer-' + (layerIdCounter++), name: 'Annotations', floor: activeFloor, type: 'objects', visible: true };
    layers.push(layer);
    renderLayers();
  }
  return layer;
}

function addImageLayer(img, name) {
  const layer = {
    id: 'layer-' + (layerIdCounter++),
    name: name || 'Map Image',
    floor: activeFloor,
    type: 'image',
    visible: true,
    image: img,
    ox: -img.width / 2,
    oy: -img.height / 2,
    iw: img.width,
    ih: img.height,
    opacity: 1
  };
  layers.push(layer);
  activeLayerId = layer.id;

  // Center camera on image
  cam.x = W / 2;
  cam.y = H / 2;
  const fitZoom = Math.min(W / img.width * 0.8, H / img.height * 0.8, 2);
  cam.zoom = fitZoom;
  document.getElementById('zoom-level').textContent = Math.round(cam.zoom * 100) + '%';

  renderLayers();
  render();
  toast('Image layer added');
}

function renderLayers() {
  const list = document.getElementById('layers-list');
  const floorLayers = layers.filter(l => l.floor === activeFloor);
  list.innerHTML = floorLayers.map(l => `
    <div class="layer-item${l.id===activeLayerId?' active':''}" data-id="${l.id}" onclick="selectLayer('${l.id}')">
      <button class="vis-btn ${l.visible?'':'hidden'}" onclick="event.stopPropagation();toggleLayerVis('${l.id}')">
        ${l.visible ? eyeIcon() : eyeOffIcon()}
      </button>
      <span class="layer-name">${l.name}</span>
      <span class="floor-badge">${l.type === 'image' ? 'IMG' : 'OBJ'}</span>
      <button class="del-btn" onclick="event.stopPropagation();deleteLayer('${l.id}')">&times;</button>
    </div>
  `).join('');
}

function selectLayer(id) {
  activeLayerId = id;
  renderLayers();
}

function toggleLayerVis(id) {
  const l = layers.find(la => la.id === id);
  if (l) { l.visible = !l.visible; renderLayers(); render(); }
}

function deleteLayer(id) {
  pushUndo();
  layers = layers.filter(l => l.id !== id);
  objects = objects.filter(o => o.layerId !== id);
  if (activeLayerId === id) activeLayerId = null;
  renderLayers();
  render();
}

function eyeIcon() { return '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>'; }
function eyeOffIcon() { return '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>'; }

// ================================================================
// FLOORS
// ================================================================
function renderFloors() {
  const el = document.getElementById('floor-tabs');
  el.innerHTML = floors.map(f => `
    <button class="floor-tab${f.id===activeFloor?' active':''}" onclick="switchFloor('${f.id}')" ondblclick="renameFloor('${f.id}')">${f.name}</button>
  `).join('');
}

function switchFloor(id) {
  activeFloor = id;
  activeLayerId = null;
  selected = [];
  drawing = null;
  hideProperties();
  renderFloors();
  renderLayers();
  render();
}

function addFloor() {
  const name = prompt('Floor name:', `Floor ${floors.length + 1}`);
  if (!name) return;
  const id = 'f' + (floorIdCounter++);
  floors.push({ id, name });
  switchFloor(id);
  toast(`Floor "${name}" added`);
}

function renameFloor(id) {
  const f = floors.find(fl => fl.id === id);
  if (!f) return;
  const name = prompt('Rename floor:', f.name);
  if (name) { f.name = name; renderFloors(); }
}

// ================================================================
// IMAGE HANDLING
// ================================================================
function setupPaste() {
  document.addEventListener('paste', e => {
    const items = e.clipboardData?.items;
    if (!items) return;
    for (const item of items) {
      if (item.type.startsWith('image/')) {
        e.preventDefault();
        const blob = item.getAsFile();
        loadImageFromBlob(blob);
        return;
      }
    }
  });
}

function setupDragDrop() {
  const el = wrap;
  const overlay = document.getElementById('drop-overlay');

  el.addEventListener('dragover', e => { e.preventDefault(); overlay.classList.add('show'); });
  el.addEventListener('dragleave', e => { overlay.classList.remove('show'); });
  el.addEventListener('drop', e => {
    e.preventDefault();
    overlay.classList.remove('show');
    const files = e.dataTransfer.files;
    for (const file of files) {
      if (file.type.startsWith('image/')) {
        loadImageFromBlob(file);
      }
    }
  });
}

function loadImageFromBlob(blob) {
  const url = URL.createObjectURL(blob);
  const img = new Image();
  img.onload = () => addImageLayer(img, blob.name || 'Pasted Image');
  img.src = url;
}

function pasteImagePrompt() {
  document.getElementById('file-input').click();
  closeContextMenu();
}

document.getElementById('file-input').addEventListener('change', e => {
  for (const file of e.target.files) {
    if (file.type.startsWith('image/')) loadImageFromBlob(file);
  }
  e.target.value = '';
});

// ================================================================
// TOOLBAR
// ================================================================
function setupToolbar() {
  document.querySelectorAll('[data-tool]').forEach(btn => {
    btn.addEventListener('click', () => {
      currentTool = btn.dataset.tool;
      document.querySelectorAll('[data-tool]').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      if (drawing && drawing.type === 'route') {
        // Finish route
        pushUndo();
        drawing.id = objIdCounter++;
        objects.push(drawing);
        drawing = null;
        render();
      }
      drawing = null;
    });
  });

  document.getElementById('color-pick').addEventListener('input', e => { drawColor = e.target.value; });
  document.getElementById('stroke-size').addEventListener('change', e => { strokeSize = +e.target.value; });

  document.getElementById('btn-undo').addEventListener('click', undo);
  document.getElementById('btn-redo').addEventListener('click', redo);
  document.getElementById('btn-save').addEventListener('click', saveProject);
  document.getElementById('btn-load').addEventListener('click', () => document.getElementById('load-input').click());
  document.getElementById('btn-export').addEventListener('click', exportImage);
  document.getElementById('btn-add-layer').addEventListener('click', () => document.getElementById('file-input').click());
  document.getElementById('btn-add-floor').addEventListener('click', addFloor);

  document.getElementById('zoom-in').addEventListener('click', () => { cam.zoom = Math.min(20, cam.zoom * 1.2); document.getElementById('zoom-level').textContent = Math.round(cam.zoom * 100) + '%'; render(); });
  document.getElementById('zoom-out').addEventListener('click', () => { cam.zoom = Math.max(0.05, cam.zoom / 1.2); document.getElementById('zoom-level').textContent = Math.round(cam.zoom * 100) + '%'; render(); });
}

function setupSidebar() {
  document.getElementById('load-input').addEventListener('change', e => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      try {
        loadProject(JSON.parse(ev.target.result));
        toast('Project loaded');
      } catch (err) {
        toast('Failed to load project');
      }
    };
    reader.readAsText(file);
    e.target.value = '';
  });
}

// ================================================================
// KEYBOARD
// ================================================================
function setupKeyboard() {
  document.addEventListener('keydown', e => {
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;

    if (e.code === 'Space') { spaceDown = true; canvas.style.cursor = 'grab'; e.preventDefault(); }

    if (e.key === 'Delete' || e.key === 'Backspace') {
      if (selected.length) {
        pushUndo();
        objects = objects.filter(o => !selected.includes(o.id));
        selected = [];
        hideProperties();
        render();
      }
    }

    if (e.key === 'Escape') {
      if (drawing) { drawing = null; render(); }
      selected = [];
      hideProperties();
      render();
    }

    // Tool shortcuts
    if (e.key === 'v' || e.key === 'V') clickTool('select');
    if (e.key === 'm' || e.key === 'M') clickTool('marker');
    if (e.key === 'l' || e.key === 'L') clickTool('line');
    if (e.key === 'a' || e.key === 'A') clickTool('arrow');
    if (e.key === 'r' || e.key === 'R') clickTool('route');
    if (e.key === 'z' && !e.ctrlKey) clickTool('zone');
    if (e.key === 'f' || e.key === 'F') clickTool('freehand');
    if (e.key === 'b' || e.key === 'B') clickTool('breach');
    if (e.key === 't' || e.key === 'T') clickTool('label');

    if (e.ctrlKey && e.key === 'z') { e.preventDefault(); undo(); }
    if (e.ctrlKey && (e.key === 'y' || (e.shiftKey && e.key === 'Z'))) { e.preventDefault(); redo(); }
  });

  document.addEventListener('keyup', e => {
    if (e.code === 'Space') { spaceDown = false; canvas.style.cursor = currentTool === 'select' ? 'default' : 'crosshair'; }
  });
}

function clickTool(name) {
  const btn = document.querySelector(`[data-tool="${name}"]`);
  if (btn) btn.click();
}

// ================================================================
// UNDO/REDO
// ================================================================
function pushUndo() {
  undoStack.push({
    objects: JSON.parse(JSON.stringify(objects)),
    layers: layers.map(l => ({ ...l, image: l.image })) // keep refs
  });
  redoStack = [];
  if (undoStack.length > 50) undoStack.shift();
}

function undo() {
  if (!undoStack.length) return;
  redoStack.push({
    objects: JSON.parse(JSON.stringify(objects)),
    layers: layers.map(l => ({ ...l, image: l.image }))
  });
  const state = undoStack.pop();
  objects = state.objects;
  layers = state.layers;
  selected = [];
  hideProperties();
  renderLayers();
  render();
}

function redo() {
  if (!redoStack.length) return;
  undoStack.push({
    objects: JSON.parse(JSON.stringify(objects)),
    layers: layers.map(l => ({ ...l, image: l.image }))
  });
  const state = redoStack.pop();
  objects = state.objects;
  layers = state.layers;
  selected = [];
  hideProperties();
  renderLayers();
  render();
}

// ================================================================
// SAVE / LOAD / EXPORT
// ================================================================
function saveProject() {
  const data = {
    version: 1,
    floors,
    activeFloor,
    layers: layers.map(l => {
      const out = { ...l };
      if (l.type === 'image' && l.image) {
        // Serialize image to data URL
        const c = document.createElement('canvas');
        c.width = l.image.naturalWidth || l.image.width;
        c.height = l.image.naturalHeight || l.image.height;
        c.getContext('2d').drawImage(l.image, 0, 0);
        out.imageData = c.toDataURL('image/png');
        delete out.image;
      }
      return out;
    }),
    objects,
    cam
  };

  const blob = new Blob([JSON.stringify(data)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'mission-plan.json';
  a.click();
  toast('Project saved');
}

function loadProject(data) {
  floors = data.floors || [{ id: 'f1', name: 'Floor 1' }];
  activeFloor = data.activeFloor || 'f1';
  objects = data.objects || [];
  cam = data.cam || { x: 0, y: 0, zoom: 1 };

  // Rebuild layers with images
  layers = [];
  let loadPromises = [];

  for (const l of (data.layers || [])) {
    if (l.imageData) {
      const layer = { ...l, image: null };
      layers.push(layer);
      const img = new Image();
      const p = new Promise(resolve => { img.onload = () => { layer.image = img; resolve(); }; });
      img.src = l.imageData;
      delete layer.imageData;
      loadPromises.push(p);
    } else {
      layers.push(l);
    }
  }

  Promise.all(loadPromises).then(() => {
    // Recalculate ID counters
    objIdCounter = Math.max(1, ...objects.map(o => o.id)) + 1;
    layerIdCounter = Math.max(1, ...layers.map(l => parseInt(l.id.replace('layer-', '')) || 0)) + 1;
    floorIdCounter = Math.max(2, ...floors.map(f => parseInt(f.id.replace('f', '')) || 0)) + 1;

    document.getElementById('zoom-level').textContent = Math.round(cam.zoom * 100) + '%';
    selected = [];
    drawing = null;
    hideProperties();
    renderFloors();
    renderLayers();
    render();
  });
}

function exportImage() {
  // Determine bounds
  let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;

  for (const l of layers) {
    if (!l.visible || l.floor !== activeFloor || l.type !== 'image' || !l.image) continue;
    const ox = l.ox || 0, oy = l.oy || 0;
    minX = Math.min(minX, ox);
    minY = Math.min(minY, oy);
    maxX = Math.max(maxX, ox + (l.iw || l.image.width));
    maxY = Math.max(maxY, oy + (l.ih || l.image.height));
  }

  for (const obj of objects) {
    if (obj.floor !== activeFloor) continue;
    const bb = getBounds(obj);
    if (!bb) continue;
    minX = Math.min(minX, bb.x);
    minY = Math.min(minY, bb.y);
    maxX = Math.max(maxX, bb.x + bb.w);
    maxY = Math.max(maxY, bb.y + bb.h);
  }

  if (!isFinite(minX)) { toast('Nothing to export'); return; }

  const pad = 40;
  const ew = (maxX - minX) + pad * 2;
  const eh = (maxY - minY) + pad * 2;

  const ec = document.createElement('canvas');
  ec.width = ew;
  ec.height = eh;
  const ectx = ec.getContext('2d');

  ectx.fillStyle = '#0d0d14';
  ectx.fillRect(0, 0, ew, eh);

  // Temporarily adjust cam
  const origCam = { ...cam };
  cam = { x: -minX + pad, y: -minY + pad, zoom: 1 };

  ectx.translate(cam.x, cam.y);

  for (const layer of layers) {
    if (!layer.visible || layer.floor !== activeFloor) continue;
    if (layer.type === 'image' && layer.image) {
      ectx.globalAlpha = layer.opacity !== undefined ? layer.opacity : 1;
      ectx.drawImage(layer.image, layer.ox || 0, layer.oy || 0, layer.iw || layer.image.width, layer.ih || layer.image.height);
      ectx.globalAlpha = 1;
    }
  }

  // Swap context for drawing
  const origCtx = ctx;
  const origCanvas = canvas;
  // We re-use drawObject by swapping
  // Actually, let's just re-render to the export canvas manually
  cam = origCam;

  // Simpler: use toBlob on the main canvas with adjusted view
  // Let's just capture what's visible plus do a full render
  const tmpCam = { x: -minX + pad, y: -minY + pad, zoom: 1 };

  // Reset context
  ectx.setTransform(1, 0, 0, 1, 0, 0);
  ectx.fillStyle = '#0d0d14';
  ectx.fillRect(0, 0, ew, eh);
  ectx.translate(tmpCam.x, tmpCam.y);

  for (const layer of layers) {
    if (!layer.visible || layer.floor !== activeFloor) continue;
    if (layer.type === 'image' && layer.image) {
      ectx.globalAlpha = layer.opacity !== undefined ? layer.opacity : 1;
      ectx.drawImage(layer.image, layer.ox || 0, layer.oy || 0, layer.iw || layer.image.width, layer.ih || layer.image.height);
      ectx.globalAlpha = 1;
    }
  }

  // Draw objects on export canvas
  const exportObjs = objects.filter(o => o.floor === activeFloor);
  for (const obj of exportObjs) {
    const layer = layers.find(l => l.id === obj.layerId);
    if (layer && !layer.visible) continue;

    ectx.strokeStyle = obj.color || drawColor;
    ectx.fillStyle = obj.color || drawColor;
    ectx.lineWidth = obj.size || strokeSize;
    ectx.lineCap = 'round';
    ectx.lineJoin = 'round';

    // Simplified re-draw
    drawObjectToCtx(ectx, obj, 1);
  }

  ec.toBlob(blob => {
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `mission-${activeFloor}-${Date.now()}.png`;
    a.click();
    toast('Image exported');
  }, 'image/png');
}

function drawObjectToCtx(c, obj, zoom) {
  c.strokeStyle = obj.color || drawColor;
  c.fillStyle = obj.color || drawColor;
  c.lineWidth = obj.size || strokeSize;
  c.lineCap = 'round';
  c.lineJoin = 'round';

  switch (obj.type) {
    case 'marker': {
      const s = 12;
      c.beginPath(); c.arc(obj.x, obj.y, s * 0.5, 0, Math.PI * 2); c.fill();
      c.beginPath(); c.arc(obj.x, obj.y, s, 0, Math.PI * 2); c.lineWidth = 2; c.stroke();
      if (obj.text) { c.font = '600 12px Inter,sans-serif'; c.textAlign = 'center'; c.fillText(obj.text, obj.x, obj.y - s - 6); }
      break;
    }
    case 'breach': {
      const s = 14;
      c.strokeStyle = obj.color || '#ff4d6a'; c.lineWidth = 3;
      c.beginPath(); c.arc(obj.x, obj.y, s, 0, Math.PI * 2); c.stroke();
      c.beginPath(); c.moveTo(obj.x-s*0.5,obj.y); c.lineTo(obj.x+s*0.5,obj.y); c.moveTo(obj.x,obj.y-s*0.5); c.lineTo(obj.x,obj.y+s*0.5); c.stroke();
      if (obj.text) { c.font = '600 11px Inter,sans-serif'; c.fillStyle = obj.color||'#ff4d6a'; c.textAlign = 'center'; c.fillText(obj.text, obj.x, obj.y - s - 6); }
      break;
    }
    case 'threat': {
      const s = 14;
      c.fillStyle = obj.color || '#fbbf24';
      c.beginPath(); c.moveTo(obj.x, obj.y-s); c.lineTo(obj.x+s*0.9, obj.y+s*0.6); c.lineTo(obj.x-s*0.9, obj.y+s*0.6); c.closePath(); c.fill();
      c.fillStyle = '#000'; c.font = '800 12px Inter,sans-serif'; c.textAlign = 'center'; c.textBaseline = 'middle'; c.fillText('!', obj.x, obj.y); c.textBaseline = 'alphabetic';
      if (obj.text) { c.font = '600 11px Inter,sans-serif'; c.fillStyle = obj.color||'#fbbf24'; c.textAlign = 'center'; c.fillText(obj.text, obj.x, obj.y - s - 6); }
      break;
    }
    case 'label': {
      const text = obj.text || 'Label';
      const fs = obj.fontSize || 14;
      c.font = `700 ${fs}px Inter,sans-serif`;
      const m = c.measureText(text);
      c.fillStyle = 'rgba(0,0,0,0.5)';
      c.fillRect(obj.x-4, obj.y-fs-4, m.width+8, fs+8);
      c.fillStyle = obj.color || drawColor;
      c.textAlign = 'left';
      c.fillText(text, obj.x, obj.y);
      break;
    }
    case 'line':
      if (obj.x2 === undefined) break;
      c.beginPath(); c.moveTo(obj.x, obj.y); c.lineTo(obj.x2, obj.y2); c.stroke();
      break;
    case 'arrow': {
      if (obj.x2 === undefined) break;
      c.beginPath(); c.moveTo(obj.x, obj.y); c.lineTo(obj.x2, obj.y2); c.stroke();
      const angle = Math.atan2(obj.y2-obj.y, obj.x2-obj.x);
      const hs = 12;
      c.beginPath(); c.moveTo(obj.x2, obj.y2);
      c.lineTo(obj.x2 - hs*Math.cos(angle-0.4), obj.y2 - hs*Math.sin(angle-0.4));
      c.lineTo(obj.x2 - hs*Math.cos(angle+0.4), obj.y2 - hs*Math.sin(angle+0.4));
      c.closePath(); c.fill();
      break;
    }
    case 'route': {
      if (!obj.points || obj.points.length < 2) break;
      c.setLineDash([8, 5]);
      c.beginPath(); c.moveTo(obj.points[0].x, obj.points[0].y);
      for (let i = 1; i < obj.points.length; i++) c.lineTo(obj.points[i].x, obj.points[i].y);
      c.stroke(); c.setLineDash([]);
      const last = obj.points[obj.points.length-1], prev = obj.points[obj.points.length-2];
      const a2 = Math.atan2(last.y-prev.y, last.x-prev.x);
      c.beginPath(); c.moveTo(last.x,last.y);
      c.lineTo(last.x-10*Math.cos(a2-0.4),last.y-10*Math.sin(a2-0.4));
      c.lineTo(last.x-10*Math.cos(a2+0.4),last.y-10*Math.sin(a2+0.4));
      c.closePath(); c.fill();
      for (const p of obj.points) { c.beginPath(); c.arc(p.x,p.y,3,0,Math.PI*2); c.fill(); }
      if (obj.text) { const mid = obj.points[Math.floor(obj.points.length/2)]; c.font='600 11px Inter,sans-serif'; c.textAlign='center'; c.fillText(obj.text,mid.x,mid.y-10); }
      break;
    }
    case 'zone': {
      if (obj.x2 === undefined) break;
      const x = Math.min(obj.x,obj.x2), y = Math.min(obj.y,obj.y2);
      const w = Math.abs(obj.x2-obj.x), h = Math.abs(obj.y2-obj.y);
      c.fillStyle = hexToRgba(obj.color||drawColor,0.12);
      c.fillRect(x,y,w,h); c.strokeRect(x,y,w,h);
      if (obj.text) { c.font='600 12px Inter,sans-serif'; c.fillStyle=obj.color||drawColor; c.textAlign='center'; c.fillText(obj.text,x+w/2,y-6); }
      break;
    }
    case 'freehand': {
      if (!obj.points || obj.points.length < 2) break;
      c.beginPath(); c.moveTo(obj.points[0].x, obj.points[0].y);
      for (let i = 1; i < obj.points.length; i++) c.lineTo(obj.points[i].x, obj.points[i].y);
      c.stroke();
      break;
    }
  }
}

// ================================================================
// TOAST
// ================================================================
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(el._t);
  el._t = setTimeout(() => el.classList.remove('show'), 2500);
}

// ================================================================
// BOOT
// ================================================================
init();
</script>
